<!--
  Jekyll Simple Search loader
  See: <https://github.com/christian-fei/Simple-Jekyll-Search>

  functionality to extract and highlight matched snippets in search results added <https://github.com/ohmlaws/ohmlaws.github.io> 
-->

{% capture result_elem %}
  <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
    <header>
      <h2><a href="{url}">{title}</a></h2>
      <div class="post-meta d-flex flex-column flex-sm-row text-muted mt-1 mb-1">{categories}{tags}</div>
    </header>
    <p>{content}</p>
  </article>
{% endcapture %}

{% capture not_found %}<p class="mt-5">{{ site.data.locales[include.lang].search.no_results }}</p>{% endcapture %}

<script>
  function escapeRegExp(s) {
    return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');

    // Safety check: Prevent crash if search elements aren't loaded yet
    if (!searchInput || !searchResults) return;

    SimpleJekyllSearch({
      searchInput: searchInput,
      resultsContainer: searchResults,
      json: '{{ "/assets/js/data/search.json" | relative_url }}',
      searchResultTemplate: '{{ result_elem | strip_newlines }}',
      noResultsText: '{{ not_found }}',
      templateMiddleware: function(prop, value) {
        
        // Safety check: Fallback to empty string if JSON data is missing
        value = value || ''; 
        const term = searchInput.value.trim();

        if (prop === 'categories') {
          return value ? `<div class="me-sm-4"><i class="far fa-folder fa-fw"></i>${value}</div>` : '';
        }
        
        if (prop === 'tags') {
          return value ? `<div><i class="fa fa-tag fa-fw"></i>${value}</div>` : '';
        }
        
        if (prop === 'content') {
          if (term) {
            // Simpler, safer Regex: Matches the exact typed phrase PLUS any trailing letters attached to it
            // (e.g., typing "find" will safely match and highlight "finding")
            const regex = new RegExp('(' + escapeRegExp(term) + '\\S*)', 'gi');
            const match = regex.exec(value);
            
            if (match) {
              let start = Math.max(0, match.index - 100);
              let end = Math.min(value.length, match.index + match[0].length + 100);
              
              // Safely find nearest spaces to avoid cutting words in half
              const spaceBefore = value.indexOf(' ', start);
              const spaceAfter = value.lastIndexOf(' ', end);
              
              if (spaceBefore !== -1 && spaceBefore < match.index) start = spaceBefore + 1;
              if (spaceAfter !== -1 && spaceAfter > match.index) end = spaceAfter;
              
              let snippet = value.substring(start, end);
              
              if (start > 0) snippet = '...' + snippet;
              if (end < value.length) snippet += '...';
              
              // Wrap the matched word in our yellow highlight tag
              return snippet.replace(regex, '<mark class="bg-warning text-dark">$1</mark>');
            }
          }
          
          // Fallback if no exact match is found
          return value.length > 150 ? value.substring(0, 150) + '...' : value;
        }
      }
    });

    // Intercept clicks to grab the exact highlighted word and feed it to the browser link
    searchResults.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link) {
        const article = link.closest('article');
        if (article) {
          const mark = article.querySelector('mark');
          if (mark) {
            // Grab whatever text our script highlighted (e.g., "finding")
            const matchedText = mark.textContent.trim().replace(/\s+/g, ' ');
            // Attach it to the URL before the browser loads the page
            link.href = link.href.split('#')[0] + '#:~:text=' + encodeURIComponent(matchedText);
          }
        }
      }
    });
    
  });
</script>
